# docker-compose.yml — local dev stack
#
# Phase 1: postgres only (core).
# Phase 2+ will add the mcp-server service.
# Optional modules attach via profiles (telegram, article, pdf, audio,
# image, obsidian, n8n). Start core only:
#
#   docker compose up -d
#
# Start core + a module:
#
#   docker compose --profile telegram up -d
#
# Reset everything (DESTRUCTIVE — wipes pg_data volume):
#
#   docker compose down -v

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: openbrain-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB:       ${POSTGRES_DB:-openbrain}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Postgres auto-runs *.sql files in this directory on first init.
      # If you change SQL after the volume exists, `docker compose down -v`
      # is required to re-trigger init.
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-openbrain}"]
      interval: 5s
      timeout:  3s
      retries:  10
      start_period: 5s
    restart: unless-stopped

  mcp-server:
    build:
      context: ./services/mcp-server
      dockerfile: Dockerfile
    container_name: openbrain-mcp-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-devpass}@postgres:5432/${POSTGRES_DB:-openbrain}
      BRAIN_KEY: ${BRAIN_KEY:?BRAIN_KEY must be set in .env}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-openrouter}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      # Per-IP rate limiting (Phase 9). On by default, 100 req/min/IP.
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-100}
      # Module flags propagated through. Default false.
      MODULE_DOCUMENTS_ENABLED:      ${MODULE_DOCUMENTS_ENABLED:-false}
      MODULE_TELEGRAM_BOT_ENABLED:   ${MODULE_TELEGRAM_BOT_ENABLED:-false}
      MODULE_WORKERS_ARTICLE_ENABLED: ${MODULE_WORKERS_ARTICLE_ENABLED:-false}
      MODULE_WORKERS_PDF_ENABLED:     ${MODULE_WORKERS_PDF_ENABLED:-false}
      MODULE_WORKERS_AUDIO_ENABLED:   ${MODULE_WORKERS_AUDIO_ENABLED:-false}
      MODULE_WORKERS_IMAGE_ENABLED:   ${MODULE_WORKERS_IMAGE_ENABLED:-false}
      MODULE_OBSIDIAN_MIRROR_ENABLED: ${MODULE_OBSIDIAN_MIRROR_ENABLED:-false}
      MODULE_N8N_SCHEDULER_ENABLED:   ${MODULE_N8N_SCHEDULER_ENABLED:-false}
      MODULE_GRAPHIFY_ENABLED:        ${MODULE_GRAPHIFY_ENABLED:-false}
    volumes:
      # Mount features.yaml read-only so module-flag changes outside
      # env vars also take effect on the next container restart.
      - ./config/features.yaml:/app/config/features.yaml:ro
      # graphify (Phase 15) export target. The export_project_corpus
      # tool writes here; the host + a graphify run read it back. A
      # named volume keeps exports off the repo tree.
      - exports:/exports
    ports:
      - "${MCP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout:  3s
      retries:  5
      start_period: 10s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: redis queue (workers use this from Phase 12)
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: openbrain-redis
    profiles: [telegram, article, pdf, audio, image]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: telegram capture bot
  # ────────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: openbrain-telegram-bot
    profiles: [telegram]
    environment:
      MODULE_TELEGRAM_BOT_ENABLED: ${MODULE_TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN:          ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_ID:           ${TELEGRAM_OWNER_ID:-}
      # The bot calls the MCP server over the docker network; the
      # service name `mcp-server` resolves to the running container.
      # The full URL must include the ?key= because Telegram clients
      # cannot set custom headers.
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: article ingestion worker (Phase 12.b)
  # ────────────────────────────────────────────────────────────
  worker-article:
    build:
      context: ./services/workers/article
      dockerfile: Dockerfile
    container_name: openbrain-worker-article
    profiles: [article]
    environment:
      MODULE_WORKERS_ARTICLE_ENABLED: ${MODULE_WORKERS_ARTICLE_ENABLED:-false}
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_QUEUE:               ${WORKER_QUEUE_ARTICLE:-ingest:article}
      WORKER_MAX_CHUNK_TOKENS:    ${WORKER_MAX_CHUNK_TOKENS:-800}
      WORKER_CHUNK_OVERLAP_TOKENS: ${WORKER_CHUNK_OVERLAP_TOKENS:-120}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: pdf ingestion worker (Phase 12.c)
  # ────────────────────────────────────────────────────────────
  worker-pdf:
    build:
      context: ./services/workers/pdf
      dockerfile: Dockerfile
    container_name: openbrain-worker-pdf
    profiles: [pdf]
    environment:
      MODULE_WORKERS_PDF_ENABLED: ${MODULE_WORKERS_PDF_ENABLED:-false}
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_QUEUE:                ${WORKER_QUEUE_PDF:-ingest:pdf}
      WORKER_MAX_PDF_BYTES:        ${WORKER_MAX_PDF_BYTES:-20971520}
      WORKER_MAX_CHUNK_TOKENS:     ${WORKER_MAX_CHUNK_TOKENS:-800}
      WORKER_CHUNK_OVERLAP_TOKENS: ${WORKER_CHUNK_OVERLAP_TOKENS:-120}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: audio + youtube ingestion worker (Phase 12.d)
  # ────────────────────────────────────────────────────────────
  worker-audio:
    build:
      context: ./services/workers/audio
      dockerfile: Dockerfile
    container_name: openbrain-worker-audio
    profiles: [audio]
    environment:
      MODULE_WORKERS_AUDIO_ENABLED: ${MODULE_WORKERS_AUDIO_ENABLED:-false}
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_QUEUE_VOICE:          ${WORKER_QUEUE_VOICE:-ingest:voice}
      WORKER_QUEUE_YOUTUBE:        ${WORKER_QUEUE_YOUTUBE:-ingest:youtube}
      WORKER_WHISPER_MODEL:        ${WORKER_WHISPER_MODEL:-small}
      WORKER_WHISPER_COMPUTE_TYPE: ${WORKER_WHISPER_COMPUTE_TYPE:-int8}
      WORKER_MAX_AUDIO_BYTES:      ${WORKER_MAX_AUDIO_BYTES:-209715200}
      WORKER_MAX_CHUNK_TOKENS:     ${WORKER_MAX_CHUNK_TOKENS:-800}
      WORKER_CHUNK_OVERLAP_TOKENS: ${WORKER_CHUNK_OVERLAP_TOKENS:-120}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
      # Persist whisper model weights so the ~250 MB download for
      # the `small` model only happens once per host.
      - whisper_models:/root/.cache/huggingface
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: image ingestion worker (Phase 12.e)
  # ────────────────────────────────────────────────────────────
  worker-image:
    build:
      context: ./services/workers/image
      dockerfile: Dockerfile
    container_name: openbrain-worker-image
    profiles: [image]
    environment:
      MODULE_WORKERS_IMAGE_ENABLED: ${MODULE_WORKERS_IMAGE_ENABLED:-false}
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # OpenRouter key required at runtime when the flag is on, since
      # the worker offloads OCR + description to a vision model.
      OPENROUTER_API_KEY:          ${OPENROUTER_API_KEY:-}
      WORKER_QUEUE:                ${WORKER_QUEUE_IMAGE:-ingest:image}
      WORKER_VISION_MODEL:         ${WORKER_VISION_MODEL:-qwen/qwen-2.5-vl-7b-instruct}
      WORKER_MAX_IMAGE_BYTES:      ${WORKER_MAX_IMAGE_BYTES:-10485760}
      WORKER_MAX_CHUNK_TOKENS:     ${WORKER_MAX_CHUNK_TOKENS:-800}
      WORKER_CHUNK_OVERLAP_TOKENS: ${WORKER_CHUNK_OVERLAP_TOKENS:-120}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: obsidian vault mirror (Phase 13)
  # ────────────────────────────────────────────────────────────
  obsidian-sync:
    build:
      context: ./services/obsidian-sync
      dockerfile: Dockerfile
    container_name: openbrain-obsidian-sync
    profiles: [obsidian]
    environment:
      MODULE_OBSIDIAN_MIRROR_ENABLED: ${MODULE_OBSIDIAN_MIRROR_ENABLED:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-devpass}@postgres:5432/${POSTGRES_DB:-openbrain}
      VAULT_DIR: /vault
      VAULT_BACKFILL_ON_START: ${VAULT_BACKFILL_ON_START:-true}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
      - vault:/vault
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Git-push sidecar: commits the vault to a remote every 15 min.
  # Idle no-op unless the obsidian module is enabled AND a remote is
  # configured (see docs/phase-13-go-live.md). Uses a tiny alpine/git
  # image; the loop is a plain shell script passed via command.
  obsidian-git:
    image: alpine/git:latest
    container_name: openbrain-obsidian-git
    profiles: [obsidian]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          if [ -d /vault/.git ]; then
            cd /vault \
              && git add -A \
              && (git diff --cached --quiet || git commit -m "auto: vault sync $(date -u +%FT%TZ)") \
              && (git remote | grep -q origin && git push origin HEAD || true)
          fi
          sleep 900
        done
    volumes:
      - vault:/vault
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: n8n scheduler (Phase 14)
  # ────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: openbrain-n8n
    profiles: [n8n]
    environment:
      # n8n persists its workflows + credentials in the shared
      # Postgres under a dedicated schema so it never collides with
      # the brain's tables.
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-openbrain}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      DB_POSTGRESDB_SCHEMA: n8n
      # Encrypts stored credentials. MUST be stable across restarts
      # or saved credentials become unreadable.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-openssl-rand-hex-32}
      N8N_PORT: "5678"
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      # Editor UI basic auth (recommended even locally).
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      # The brain URL workflows call. Includes ?key= because n8n's
      # HTTP node sends it as-is.
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      GENERIC_TIMEZONE: ${TZ:-UTC}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount the workflow templates read-only so they can be
      # imported from the editor's "Import from File" using the
      # path /workflows/<name>.json.
      - ./services/n8n/workflows:/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
    name: openbrain_pg_data
  whisper_models:
    name: openbrain_whisper_models
  vault:
    name: openbrain_vault
  n8n_data:
    name: openbrain_n8n_data
  exports:
    name: openbrain_exports
