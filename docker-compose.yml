# docker-compose.yml — local dev stack
#
# Phase 1: postgres only (core).
# Phase 2+ will add the mcp-server service.
# Optional modules attach via profiles (telegram, article, pdf, audio,
# image, obsidian, n8n). Start core only:
#
#   docker compose up -d
#
# Start core + a module:
#
#   docker compose --profile telegram up -d
#
# Reset everything (DESTRUCTIVE — wipes pg_data volume):
#
#   docker compose down -v

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: openbrain-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB:       ${POSTGRES_DB:-openbrain}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Postgres auto-runs *.sql files in this directory on first init.
      # If you change SQL after the volume exists, `docker compose down -v`
      # is required to re-trigger init.
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-openbrain}"]
      interval: 5s
      timeout:  3s
      retries:  10
      start_period: 5s
    restart: unless-stopped

  mcp-server:
    build:
      context: ./services/mcp-server
      dockerfile: Dockerfile
    container_name: openbrain-mcp-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-devpass}@postgres:5432/${POSTGRES_DB:-openbrain}
      BRAIN_KEY: ${BRAIN_KEY:?BRAIN_KEY must be set in .env}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-openrouter}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      # Module flags propagated through. Default false.
      MODULE_DOCUMENTS_ENABLED:      ${MODULE_DOCUMENTS_ENABLED:-false}
      MODULE_TELEGRAM_BOT_ENABLED:   ${MODULE_TELEGRAM_BOT_ENABLED:-false}
      MODULE_WORKERS_ARTICLE_ENABLED: ${MODULE_WORKERS_ARTICLE_ENABLED:-false}
      MODULE_WORKERS_PDF_ENABLED:     ${MODULE_WORKERS_PDF_ENABLED:-false}
      MODULE_WORKERS_AUDIO_ENABLED:   ${MODULE_WORKERS_AUDIO_ENABLED:-false}
      MODULE_WORKERS_IMAGE_ENABLED:   ${MODULE_WORKERS_IMAGE_ENABLED:-false}
      MODULE_OBSIDIAN_MIRROR_ENABLED: ${MODULE_OBSIDIAN_MIRROR_ENABLED:-false}
      MODULE_N8N_SCHEDULER_ENABLED:   ${MODULE_N8N_SCHEDULER_ENABLED:-false}
      MODULE_GRAPHIFY_ENABLED:        ${MODULE_GRAPHIFY_ENABLED:-false}
    volumes:
      # Mount features.yaml read-only so module-flag changes outside
      # env vars also take effect on the next container restart.
      - ./config/features.yaml:/app/config/features.yaml:ro
    ports:
      - "${MCP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout:  3s
      retries:  5
      start_period: 10s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: redis queue (workers use this from Phase 12)
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: openbrain-redis
    profiles: [telegram, article, pdf, audio, image]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: telegram capture bot
  # ────────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: openbrain-telegram-bot
    profiles: [telegram]
    environment:
      MODULE_TELEGRAM_BOT_ENABLED: ${MODULE_TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN:          ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_ID:           ${TELEGRAM_OWNER_ID:-}
      # The bot calls the MCP server over the docker network; the
      # service name `mcp-server` resolves to the running container.
      # The full URL must include the ?key= because Telegram clients
      # cannot set custom headers.
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: article ingestion worker (Phase 12.b)
  # ────────────────────────────────────────────────────────────
  worker-article:
    build:
      context: ./services/workers/article
      dockerfile: Dockerfile
    container_name: openbrain-worker-article
    profiles: [article]
    environment:
      MODULE_WORKERS_ARTICLE_ENABLED: ${MODULE_WORKERS_ARTICLE_ENABLED:-false}
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_QUEUE:               ${WORKER_QUEUE_ARTICLE:-ingest:article}
      WORKER_MAX_CHUNK_TOKENS:    ${WORKER_MAX_CHUNK_TOKENS:-800}
      WORKER_CHUNK_OVERLAP_TOKENS: ${WORKER_CHUNK_OVERLAP_TOKENS:-120}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Optional module: pdf ingestion worker (Phase 12.c)
  # ────────────────────────────────────────────────────────────
  worker-pdf:
    build:
      context: ./services/workers/pdf
      dockerfile: Dockerfile
    container_name: openbrain-worker-pdf
    profiles: [pdf]
    environment:
      MODULE_WORKERS_PDF_ENABLED: ${MODULE_WORKERS_PDF_ENABLED:-false}
      BRAIN_URL: ${BRAIN_URL:-http://mcp-server:8080/mcp?key=${BRAIN_KEY:-}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_QUEUE:                ${WORKER_QUEUE_PDF:-ingest:pdf}
      WORKER_MAX_PDF_BYTES:        ${WORKER_MAX_PDF_BYTES:-20971520}
      WORKER_MAX_CHUNK_TOKENS:     ${WORKER_MAX_CHUNK_TOKENS:-800}
      WORKER_CHUNK_OVERLAP_TOKENS: ${WORKER_CHUNK_OVERLAP_TOKENS:-120}
    volumes:
      - ./config/features.yaml:/app/config/features.yaml:ro
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
    name: openbrain_pg_data
