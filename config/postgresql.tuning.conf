# Open Brain — Postgres tuning baseline (Phase 9.3)
#
# Sized for the Phase 4 target box (Hetzner CX22: 2 vCPU / 4 GB). Apply
# in Coolify: DB resource → Configuration → custom postgresql.conf, or
# append these to the resource's config and restart. Re-check the
# vector index is still used afterward with scripts/check-index-usage.sh.
#
# These are conservative for a 4 GB host where Postgres shares the box
# with the MCP app and workers. On a bigger box, scale shared_buffers
# toward 25% of RAM and effective_cache_size toward 50-75%.

# ~25% of 4 GB. The single biggest knob for read-heavy vector search.
shared_buffers = 256MB

# Per-sort / per-hash memory. HNSW search and metadata filtering benefit;
# keep modest because it is multiplied by concurrent operations.
work_mem = 16MB

# Used by VACUUM, CREATE INDEX (incl. building the HNSW index), and
# ANALYZE. Larger = faster index builds.
maintenance_work_mem = 64MB

# Tells the planner how much OS cache it can assume — pushes it toward
# index scans (what we want for the vector index) over seq scans.
effective_cache_size = 2GB

# SSD-friendly random-read cost so the planner stops over-pricing index
# scans (default 4.0 assumes spinning disks).
random_page_cost = 1.1

# Modest concurrency headroom for the app + workers + n8n + backups.
max_connections = 100
